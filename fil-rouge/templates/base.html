<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>luciole_ · La lumière dans le bruit</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/static/luciole-favicon.svg">

  <!-- OpenGraph -->
  <meta property="og:title" content="luciole_ · La lumière dans le bruit">
  <meta property="og:description" content="Agent IA de veille technologique conversationnel.">
  <meta property="og:image" content="/static/luciole-wordmark.svg">
  <meta property="og:type" content="website">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@400;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <!-- Design System -->
  <link rel="stylesheet" href="/static/pulse.css">

  {% block head %}{% endblock %}
</head>
<body>

  <!-- Masthead -->
  <header class="pulse-masthead">
    <div class="pulse-masthead-row">
      <span class="t-meta pulse-status" id="api-status">
        <span class="pulse-status-dot" id="status-dot"></span>
        <span id="status-text">En ligne</span>
      </span>
      <a href="/" class="pulse-wordmark-link" aria-label="luciole_">
        <span class="pulse-wordmark">luciole<span class="pulse-underscore">_</span></span>
      </a>
      <span class="t-meta" id="today-date"></span>
    </div>
    <nav class="pulse-nav" aria-label="Navigation principale">
      <a href="/" {% if active_page == "chat" %}class="active"{% endif %}>Chat</a>
      <a href="/dashboard" {% if active_page == "dashboard" %}class="active"{% endif %}>Tableau de bord</a>
      <a href="/about" {% if active_page == "about" %}class="active"{% endif %}>À propos</a>
    </nav>
  </header>

  <!-- Content -->
  <main class="pulse-container">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="pulse-footer">
    <div class="pulse-footer-row">
      <div class="pulse-footer-col">
        <span class="pulse-footer-label">Projet</span>
        <span class="t-meta">luciole_ · AJC Formation · 2026</span>
      </div>
      <div class="pulse-footer-col">
        <span class="pulse-footer-label">Stack</span>
        <span class="t-meta">ReAct Agent · gpt-4o-mini · FastAPI</span>
      </div>
      <div class="pulse-footer-col">
        <span class="pulse-footer-label">Source</span>
        <span class="t-meta"><a href="https://github.com/josuerochadev/formation-ia">GitHub</a></span>
      </div>
    </div>
  </footer>

  <!-- Date + API status -->
  <script>
    document.getElementById('today-date').textContent =
      new Date().toLocaleDateString('fr-FR', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });

    // Check API health
    fetch('/health').then(r => {
      if (!r.ok) throw new Error();
    }).catch(() => {
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      if (dot) dot.classList.add('pulse-status-dot--offline');
      if (text) text.textContent = 'Hors ligne';
    });
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
