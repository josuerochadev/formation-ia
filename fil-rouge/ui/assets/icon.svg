<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="24" cy="24" r="23" fill="#0B0B10" stroke="url(#icon-grad)" stroke-width="1.5" opacity="0.9"/>

  <!-- Pulse wave -->
  <polyline
    points="6,24 12,24 16,24 20,14 24,34 28,8 32,40 36,18 40,24 42,24"
    stroke="url(#icon-grad)"
    stroke-width="2.5"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
    transform="translate(0, 0)"
  />

  <!-- Peak dot -->
  <circle cx="28" cy="8" r="2.5" fill="#60A5FA"/>
</svg>
