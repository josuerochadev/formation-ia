<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" fill="none">
  <defs>
    <linearGradient id="pulse-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#60A5FA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Pulse wave icon -->
  <g transform="translate(8, 8)">
    <!-- Glow behind the wave -->
    <polyline
      points="0,24 10,24 16,24 22,10 28,38 34,4 40,44 46,14 52,24 58,24 68,24"
      stroke="url(#glow-grad)"
      stroke-width="8"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- Main wave -->
    <polyline
      points="0,24 10,24 16,24 22,10 28,38 34,4 40,44 46,14 52,24 58,24 68,24"
      stroke="url(#pulse-grad)"
      stroke-width="3"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- Active dot -->
    <circle cx="34" cy="4" r="3.5" fill="#60A5FA" opacity="0.9"/>
    <circle cx="34" cy="4" r="6" fill="#60A5FA" opacity="0.15"/>
  </g>

  <!-- Brand name -->
  <text x="90" y="43" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="32" fill="#F8FAFC" letter-spacing="-0.02em">
    Pulse
  </text>

  <!-- Tagline -->
  <text x="91" y="57" font-family="DM Sans, sans-serif" font-weight="400" font-size="10.5" fill="#64748B" letter-spacing="0.08em">
    VEILLE TECH AGENT
  </text>
</svg>
